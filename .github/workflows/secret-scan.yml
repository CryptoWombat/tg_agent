name: Secret scan

# Blocks merge if any high-entropy secret / credential pattern appears in a
# commit. Runs on every push to main and every pull request, so no path
# bypasses it (unlike a local pre-commit hook which an agent can skip).
#
# Provenance of this workflow: added 2026-04-17 in response to two leaks:
#   1. .env.production committed via `git add -A` during a dev session
#   2. .env.local.pre-relocate committed during the 2026-04-15 monorepo fold
# Both would be caught here before landing on main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for PRs; shallow for push)
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - name: Install gitleaks
        run: |
          curl -sSLo gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Scan current commit (push / workflow_dispatch)
        if: github.event_name != 'pull_request'
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --redact \
            --exit-code 1 \
            --no-banner

      - name: Scan PR commit range
        if: github.event_name == 'pull_request'
        run: |
          # Scan only the commits added by the PR, not the whole history
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --verbose \
            --redact \
            --exit-code 1 \
            --no-banner
